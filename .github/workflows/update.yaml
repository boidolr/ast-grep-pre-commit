name: Update package
on:
    schedule:
        - cron: "15 7 * * *"
    workflow_dispatch:

jobs:
    check-version:
        runs-on: ubuntu-slim
        outputs:
            VERSION: ${{ steps.version.outputs.VERSION }}
            UPDATED: ${{ steps.updated.outputs.UPDATED }}

        steps:
            - name: Get current version
              id: version
              run: |
                  version=$(npm view @ast-grep/cli version)
                  version_check='^[0-9]+\.[0-9]+\.[0-9]+$'

                  if [[ "${version}" =~ $version_check ]]; then
                    echo "Found version '$version'"
                    echo "VERSION=${version}" >> $GITHUB_OUTPUT
                  else
                    echo "::error::Invalid package version: '$version'"
                    exit 1
                  fi

            - name: Verify release exists
              id: verify-release
              env:
                  VERSION: "${{ steps.version.outputs.VERSION }}"
                  GH_TOKEN: ${{ github.token }}
              run: |
                  if ! gh api \
                    -H "Accept: application/vnd.github+json" \
                    "repos/ast-grep/ast-grep/releases/tags/${VERSION}" \
                    --jq '.tag_name' > /dev/null 2>&1; then
                    echo "::warning::Version ${VERSION} not found in ast-grep/ast-grep releases. Skipping update."
                    echo "RELEASE_EXISTS=false" >> $GITHUB_OUTPUT
                  else
                    echo "Release ${VERSION} exists in ast-grep/ast-grep"
                    echo "RELEASE_EXISTS=true" >> $GITHUB_OUTPUT
                  fi

            - name: Get current file
              run: |
                  gh api \
                    -H "Accept: application/vnd.github.raw+json" \
                    "repos/${GITHUB_REPOSITORY}/contents/.pre-commit-hooks.yaml" \
                    --output .pre-commit-hooks.yaml
              env:
                  GH_TOKEN: ${{ github.token }}

            - name: Check against local version
              id: updated
              shell: python
              env:
                  VERSION: "${{ steps.version.outputs.VERSION }}"
                  RELEASE_EXISTS: "${{ steps.verify-release.outputs.RELEASE_EXISTS }}"
              run: |
                  import pathlib, re, os

                  current_version = os.environ["VERSION"]
                  release_exists = os.environ.get("RELEASE_EXISTS", "false") == "true"
                  config = pathlib.Path(".pre-commit-hooks.yaml").read_text()

                  match = re.search(r'"@ast-grep/cli@([^"]+)"', config)
                  config_version = match.group(1) if match else current_version

                  updated = str(current_version != config_version and release_exists).lower()
                  with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                      print(f"UPDATED={updated}", file=fh)

    update-update:
        runs-on: ubuntu-slim
        needs: ["check-version"]
        if: ${{ needs.check-version.outputs.UPDATED == 'true' }}

        permissions:
            contents: write

        env:
            VERSION: "${{ needs.check-version.outputs.VERSION }}"

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Update version
              shell: python
              run: |
                  import pathlib, re, os
                  from functools import partial

                  version = os.environ["VERSION"]
                  replacements = {
                    ".pre-commit-hooks.yaml": partial(re.sub, r'"@ast-grep/cli@[^\"]+"', f'"@ast-grep/cli@{version}"'),
                    "README.md": partial(re.sub, r'rev: \d+\.\d+\.\d+', f'rev: {version}'),
                  }
                  for name, replacer in replacements.items():
                    path = pathlib.Path(name)
                    content = path.read_text()
                    path.write_text(replacer(content))

            - name: Run tests before push
              uses: ./.github/actions/test-hooks

            - name: Push update
              run: |
                  git config user.name "$GITHUB_ACTOR"
                  git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

                  git commit -am "chore: update version ${VERSION}"
                  git tag "${VERSION}"
                  git push --tags origin main
